<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --sand:        #faf3e0;
      --sand-dark:   #f0e0bb;
      --card:        #ffffff;
      --ocean:       #1a4b7a;
      --ocean-mid:   #2563a8;
      --terracotta:  #c1440e;
      --text:        #2c2416;
      --text-muted:  #8b7d6b;
      --done-bg:     #f3f3f0;
      --done-text:   #aaa098;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: var(--sand);
      color: var(--text);
    }

    /* ── Header ── */
    #header {
      background: var(--ocean);
      color: white;
      padding: 10px 16px 0;
      flex-shrink: 0;
    }
    #header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 8px;
    }
    #header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    #count {
      font-size: 0.82rem;
      opacity: 0.8;
      font-weight: 500;
    }

    /* Progress bar */
    #progress-track {
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5c36a, var(--terracotta));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Map ── */
    #map { flex: 0 0 52vh; }

    /* ── Checklist ── */
    #checklist-wrapper {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 10px 12px 4px;
    }

    .task-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: 14px;
      padding: 11px 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(44,36,22,0.08);
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .task-card.done {
      background: var(--done-bg);
      box-shadow: none;
      opacity: 0.72;
    }

    @keyframes complete-flash {
      0%   { background: var(--card); }
      35%  { background: #d1fae5; transform: scale(1.025); box-shadow: 0 3px 12px rgba(34,197,94,0.25); }
      100% { background: var(--card); transform: scale(1); }
    }
    .task-card.flash {
      animation: complete-flash 0.65s ease-out forwards;
    }

    /* Emoji column */
    .task-emoji {
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sand);
      border-radius: 10px;
      flex-shrink: 0;
      transition: opacity 0.3s;
    }
    .task-card.done .task-emoji { opacity: 0.45; }

    /* Text column */
    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
    }
    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .type-badge {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .badge-go-to-place    { background: #dbeafe; color: #1e40af; }
    .badge-find-and-count { background: #fef3c7; color: #92400e; }
    .badge-spot-a-detail  { background: #fce7f3; color: #9d174d; }
    .task-card.done .type-badge { background: #e5e5e5; color: #aaa; }

    /* Checkbox column */
    .task-check {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2.5px solid var(--sand-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
      color: transparent;
    }
    .task-card.done .task-check {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    /* ── Actions ── */
    #actions {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--card);
      border-top: 1px solid var(--sand-dark);
      flex-shrink: 0;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-export {
      flex: 1;
      background: var(--ocean);
      color: white;
    }
    #btn-reset {
      background: var(--sand-dark);
      color: var(--text-muted);
    }

    /* ── Popup ── */
    .popup-inner {
      font-size: 0.88rem;
      line-height: 1.4;
      max-width: 220px;
    }
    .popup-emoji { font-size: 1.6rem; margin-bottom: 4px; display: block; }
    .popup-title { font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .popup-done-btn {
      display: block;
      width: 100%;
      padding: 8px 0;
      background: var(--ocean);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .popup-done-btn.already {
      background: #22c55e;
      cursor: default;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h1>Summer 2026 🇵🇹</h1>
    <span id="count">0 / 0 done</span>
  </div>
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<div id="map"></div>

<div id="checklist-wrapper">
  <div id="checklist"></div>
</div>

<div id="actions">
  <button id="btn-export">Export log</button>
  <button id="btn-reset">Reset</button>
</div>

<script>
const STORAGE_KEY = 'geophoto-completions';

const TASK_EMOJI = {
  'cafe-pastel':       '☕',
  'brazil-sign':       '🌊',
  'fish-azulejos':     '🐟',
  'birdwatching-park': '🐦',
  'beach-sunset':      '🌅',
  'sea-life-porto':    '🐠',
  'mexican-fort':      '🌮',
  'sushi-lunch':       '🍣'
};

const BADGE = {
  'go-to-place':    { cls: 'badge-go-to-place',    label: 'Go to place' },
  'find-and-count': { cls: 'badge-find-and-count', label: 'Find & count' },
  'spot-a-detail':  { cls: 'badge-spot-a-detail',  label: 'Spot a detail' }
};

// ── State ──
let tasks = [];
let completions = {};
let markers = {};
let userLatLng = null;

function loadCompletions() {
  try {
    const arr = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    arr.forEach(c => { completions[c.task_id] = c; });
  } catch (e) {}
}

function saveCompletions() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(Object.values(completions)));
}

function isDone(id) { return Boolean(completions[id]); }

function updateHeader() {
  const done = Object.keys(completions).length;
  const total = tasks.length;
  document.getElementById('count').textContent = `${done} / ${total} done`;
  document.getElementById('progress-fill').style.width = total ? `${(done / total) * 100}%` : '0%';
}

// ── Map ──
const map = L.map('map').setView([41.385, -8.765], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

const userMarker = L.circleMarker([41.385, -8.765], {
  radius: 8, color: '#1d4ed8', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 2.5
});

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    userLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);
    if (!map.hasLayer(userMarker)) userMarker.addTo(map);
    userMarker.setLatLng(userLatLng);
  }, () => {}, { enableHighAccuracy: true, maximumAge: 10000 });
}

function taskIcon(taskId, done) {
  const emoji = TASK_EMOJI[taskId] || '📍';
  const bg = done ? 'rgba(220,220,215,0.9)' : 'rgba(255,255,255,0.95)';
  const shadow = done ? '0 1px 3px rgba(0,0,0,0.15)' : '0 2px 6px rgba(0,0,0,0.28)';
  const op = done ? '0.55' : '1';
  return L.divIcon({
    className: '',
    html: `<div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:${bg};border-radius:50%;box-shadow:${shadow};font-size:20px;opacity:${op}">${emoji}</div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19],
    popupAnchor: [0, -22]
  });
}

// ── Mark done ──
function markDone(taskId) {
  if (isDone(taskId)) return;
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  completions[taskId] = {
    task_id: taskId,
    title: task.properties.title,
    timestamp: new Date().toISOString(),
    lat: userLatLng ? userLatLng.lat : null,
    lng: userLatLng ? userLatLng.lng : null
  };
  saveCompletions();
  updateHeader();

  // Update marker
  markers[taskId].setIcon(taskIcon(taskId, true));
  markers[taskId].closePopup();

  // Update card
  const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
  if (card) {
    card.classList.add('done', 'flash');
    card.querySelector('.task-check').textContent = '✓';
    card.addEventListener('animationend', () => card.classList.remove('flash'), { once: true });
  }
}

// ── Build map markers ──
function buildMap() {
  tasks.forEach(task => {
    const id = task.id;
    const [lng, lat] = task.geometry.coordinates;
    const marker = L.marker([lat, lng], { icon: taskIcon(id, isDone(id)) }).addTo(map);

    marker.bindPopup(() => {
      const wrap = document.createElement('div');
      wrap.className = 'popup-inner';

      const em = document.createElement('span');
      em.className = 'popup-emoji';
      em.textContent = TASK_EMOJI[id] || '📍';

      const ttl = document.createElement('div');
      ttl.className = 'popup-title';
      ttl.textContent = task.properties.title;

      const btn = document.createElement('button');
      btn.className = 'popup-done-btn' + (isDone(id) ? ' already' : '');
      btn.textContent = isDone(id) ? '✓ Done!' : 'Mark done';
      btn.disabled = isDone(id);
      btn.addEventListener('click', () => { markDone(id); btn.textContent = '✓ Done!'; btn.className = 'popup-done-btn already'; btn.disabled = true; });

      wrap.append(em, ttl, btn);
      return wrap;
    }, { maxWidth: 250 });

    markers[id] = marker;
  });
}

// ── Build checklist ──
function buildChecklist() {
  const list = document.getElementById('checklist');
  tasks.forEach(task => {
    const id = task.id;
    const done = isDone(id);
    const props = task.properties;
    const badge = BADGE[props.type] || BADGE['go-to-place'];

    const card = document.createElement('div');
    card.className = 'task-card' + (done ? ' done' : '');
    card.dataset.id = id;

    const emojiEl = document.createElement('div');
    emojiEl.className = 'task-emoji';
    emojiEl.textContent = TASK_EMOJI[id] || '📍';

    const body = document.createElement('div');
    body.className = 'task-body';

    const title = document.createElement('div');
    title.className = 'task-title';
    title.textContent = props.title;

    const badgeEl = document.createElement('span');
    badgeEl.className = `type-badge ${badge.cls}`;
    badgeEl.textContent = badge.label;

    body.append(title, badgeEl);

    const check = document.createElement('div');
    check.className = 'task-check';
    if (done) check.textContent = '✓';

    card.append(emojiEl, body, check);

    // tap card → fly to pin on map
    card.addEventListener('click', () => {
      const [lng, lat] = task.geometry.coordinates;
      map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true });
      markers[id].openPopup();
    });

    // tap check circle directly → mark done
    check.addEventListener('click', e => {
      e.stopPropagation();
      markDone(id);
    });

    list.appendChild(card);
  });
}

// ── Load & init ──
loadCompletions();

fetch('./tasks.geojson')
  .then(r => r.json())
  .then(data => {
    tasks = data.features;
    buildMap();
    buildChecklist();
    updateHeader();
  })
  .catch(err => {
    document.getElementById('checklist').textContent = 'Could not load tasks — ' + err.message;
  });

// ── Export ──
document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(Object.values(completions), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'completion-log.json';
  a.click();
});

// ── Reset ──
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Reset all completed tasks? This cannot be undone.')) return;
  completions = {};
  localStorage.removeItem(STORAGE_KEY);
  updateHeader();
  tasks.forEach(task => {
    markers[task.id].setIcon(taskIcon(task.id, false));
    markers[task.id].closePopup();
    const card = document.querySelector(`.task-card[data-id="${task.id}"]`);
    if (card) {
      card.classList.remove('done', 'flash');
      card.querySelector('.task-check').textContent = '';
    }
  });
});
</script>
</body>
</html>
